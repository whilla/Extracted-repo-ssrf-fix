<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NexusAI Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #15203b 0%, #080b14 55%, #04060d 100%);
        color: #f3f7ff;
        font-family: system-ui, sans-serif;
      }

      main {
        max-width: 28rem;
        padding: 2rem;
        border: 1px solid rgba(123, 209, 255, 0.2);
        border-radius: 1.5rem;
        background: rgba(8, 11, 20, 0.82);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin-top: 0;
        font-size: 1.75rem;
      }

      p {
        line-height: 1.5;
        color: rgba(243, 247, 255, 0.78);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline mode is active</h1>
      <p>Saved drafts, locked memory, automation state, and voice controls remain available locally.</p>
      <p>Live trend fetches, cloud generation providers, and publishing will resume automatically when the connection comes back.</p>
    </main>
  </body>
</html>
